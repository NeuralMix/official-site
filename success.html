<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're In! — NeuralMix Waitlist</title>
  <meta name="description" content="You're on the NeuralMix waitlist! Share your unique link to skip the line and get early access faster.">
  
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://neuralmix.com/success.html">
  <meta property="og:title" content="I'm on the waitlist for NeuralMix — AI Co-Pilot for Music Mixing">
  <meta property="og:description" content="Join me on the NeuralMix waitlist and help me skip the line!">
  
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:title" content="I'm on the waitlist for NeuralMix">
  <meta property="twitter:description" content="Join me on the NeuralMix waitlist and help me skip the line!">
  
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' width='100' height='100' fill='%2322d3ee'/><path d='M25 70 L25 30 L40 55 L55 20 L70 50 L75 30' stroke='white' stroke-width='8' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&family=Rethink+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #030712;
      --bg-secondary: #0a0e1a;
      --bg-tertiary: #111827;
      
      --aurora-teal: #22d3ee;
      --aurora-green: #34d399;
      --aurora-cyan: #06b6d4;
      
      --text-primary: #f8fafc;
      --text-secondary: rgba(248, 250, 252, 0.8);
      --text-muted: rgba(248, 250, 252, 0.5);
      
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-blur: blur(20px);
      
      --success: #34d399;
      --success-glow: rgba(52, 211, 153, 0.3);
      
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --radius-full: 9999px;
    }

    @keyframes auroraDrift {
      0%, 100% { transform: translateX(-10%) translateY(0) scale(1.1); }
      33% { transform: translateX(5%) translateY(-2%) scale(1.15); }
      66% { transform: translateX(-5%) translateY(2%) scale(1.1); }
    }

    @keyframes starTwinkle {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes scaleIn {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.4); }
      50% { box-shadow: 0 0 0 12px rgba(52, 211, 153, 0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }

    body {
      font-family: 'Rethink Sans', 'Inter', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
      position: relative;
    }

    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
    }

    .bg-aurora {
      background: url('assets/aurora_001.jpg') center/cover no-repeat;
      opacity: 0.6;
      animation: auroraDrift 60s ease-in-out infinite;
    }

    .bg-gradient {
      background: 
        radial-gradient(ellipse 80% 50% at 50% 0%, rgba(34, 211, 238, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse 60% 40% at 30% 60%, rgba(52, 211, 153, 0.1) 0%, transparent 50%),
        linear-gradient(180deg, var(--bg-primary) 0%, transparent 30%, transparent 70%, var(--bg-primary) 100%);
    }

    .bg-vignette {
      background: radial-gradient(ellipse 80% 80% at 50% 50%, transparent 30%, var(--bg-primary) 100%);
    }

    .stars {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 4px white;
    }

    .star:nth-child(1) { top: 15%; left: 20%; animation: starTwinkle 3s ease-in-out infinite; }
    .star:nth-child(2) { top: 25%; left: 80%; animation: starTwinkle 4s ease-in-out infinite 0.5s; }
    .star:nth-child(3) { top: 10%; left: 60%; animation: starTwinkle 2.5s ease-in-out infinite 1s; width: 3px; height: 3px; }
    .star:nth-child(4) { top: 40%; left: 15%; animation: starTwinkle 3.5s ease-in-out infinite 1.5s; }
    .star:nth-child(5) { top: 8%; left: 45%; animation: starTwinkle 2s ease-in-out infinite 0.3s; width: 3px; height: 3px; }
    .star:nth-child(6) { top: 35%; left: 90%; animation: starTwinkle 4s ease-in-out infinite 2s; }
    .star:nth-child(7) { top: 20%; left: 5%; animation: starTwinkle 3s ease-in-out infinite 0.8s; }
    .star:nth-child(8) { top: 5%; left: 75%; animation: starTwinkle 2.5s ease-in-out infinite 1.2s; }

    .success-card {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      padding: 48px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      animation: fadeUp 0.8s var(--ease-out) backwards;
      position: relative;
    }

    .success-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, rgba(52, 211, 153, 0.2), rgba(34, 211, 238, 0.1));
      border: 1px solid rgba(52, 211, 153, 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      animation: scaleIn 0.6s var(--ease-out) 0.2s backwards, pulse 2s ease-in-out infinite 1s;
    }

    .success-icon svg {
      width: 32px;
      height: 32px;
      stroke: var(--success);
      fill: none;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .success-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      background: rgba(52, 211, 153, 0.15);
      border: 1px solid rgba(52, 211, 153, 0.3);
      border-radius: var(--radius-full);
      font-size: 13px;
      font-weight: 600;
      color: var(--aurora-green);
      margin-bottom: 16px;
      animation: fadeUp 0.6s var(--ease-out) 0.1s backwards;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      background: var(--aurora-green);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--aurora-green);
    }

    .success-title {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
      animation: fadeUp 0.6s var(--ease-out) 0.2s backwards;
    }

    .position-display {
      font-size: 64px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.03em;
      margin: 20px 0 8px;
      background: linear-gradient(135deg, var(--aurora-teal) 0%, var(--aurora-green) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-variant-numeric: tabular-nums;
      animation: fadeUp 0.6s var(--ease-out) 0.3s backwards;
    }

    .success-subtitle {
      font-size: 15px;
      color: var(--text-secondary);
      margin-bottom: 32px;
      animation: fadeUp 0.6s var(--ease-out) 0.4s backwards;
    }

    .progress-section {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 32px;
      animation: fadeUp 0.6s var(--ease-out) 0.5s backwards;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .progress-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }

    .progress-value {
      font-size: 13px;
      font-weight: 700;
      color: var(--aurora-teal);
    }

    .progress-bar {
      height: 6px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: var(--radius-full);
      overflow: hidden;
      margin-bottom: 12px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--aurora-teal), var(--aurora-green));
      border-radius: var(--radius-full);
      transition: width 1s ease-out;
      width: 0%;
    }

    .progress-hint {
      font-size: 13px;
      color: var(--text-muted);
    }

    .share-section {
      margin-bottom: 32px;
      animation: fadeUp 0.6s var(--ease-out) 0.6s backwards;
    }

    .share-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }

    .referral-link-container {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .referral-link {
      flex: 1;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-secondary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      user-select: all;
      text-align: left;
    }

    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 12px 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s var(--ease-out);
      white-space: nowrap;
    }

    .copy-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(34, 211, 238, 0.3);
    }

    .copy-btn.copied {
      background: rgba(52, 211, 153, 0.15);
      border-color: var(--success);
      color: var(--success);
    }

    .copy-btn svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    .social-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .social-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: var(--radius-full);
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s var(--ease-out);
      border: 1px solid transparent;
    }

    .social-btn.twitter {
      background: rgba(29, 161, 242, 0.1);
      border-color: rgba(29, 161, 242, 0.3);
      color: #1da1f2;
    }

    .social-btn.twitter:hover {
      background: rgba(29, 161, 242, 0.2);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(29, 161, 242, 0.2);
    }

    .social-btn.reddit {
      background: rgba(255, 69, 0, 0.1);
      border-color: rgba(255, 69, 0, 0.3);
      color: #ff4500;
    }

    .social-btn.reddit:hover {
      background: rgba(255, 69, 0, 0.2);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(255, 69, 0, 0.2);
    }

    .social-btn svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
      animation: fadeUp 0.6s var(--ease-out) 0.7s backwards;
    }

    .back-link:hover {
      color: var(--aurora-teal);
    }

    .back-link svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: var(--aurora-teal);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @media (max-width: 600px) {
      .success-card { padding: 32px 24px; }
      .position-display { font-size: 48px; }
      .success-title { font-size: 24px; }
      .referral-link-container { flex-direction: column; }
      .social-buttons { flex-direction: column; }
      .social-btn { justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="bg-layer bg-aurora"></div>
  <div class="bg-layer bg-gradient"></div>
  <div class="stars">
    <div class="star"></div><div class="star"></div><div class="star"></div>
    <div class="star"></div><div class="star"></div><div class="star"></div>
    <div class="star"></div><div class="star"></div>
  </div>
  <div class="bg-layer bg-vignette"></div>

  <div class="success-card">
    <div class="success-badge">
      <span class="badge-dot"></span>
      <span>Confirmed</span>
    </div>
    
    <div class="success-icon">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    
    <h1 class="success-title">You're on the list!</h1>
    <div class="position-display" id="position">—</div>
    <p class="success-subtitle" id="subtitle">
      <span class="loading-spinner"></span>
    </p>

    <div class="progress-section">
      <div class="progress-header">
        <span class="progress-label">Your Progress</span>
        <span class="progress-value" id="referral-count">0 referrals</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <p class="progress-hint">
        Share your link below. Each friend who joins moves you up 50 spots.
      </p>
    </div>

    <div class="share-section">
      <h3 class="share-title">Share to skip the line</h3>
      
      <div class="referral-link-container">
        <div class="referral-link" id="referral-link">Loading...</div>
        <button class="copy-btn" id="copy-btn" onclick="copyLink()">
          <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          <span id="copy-text">Copy</span>
        </button>
      </div>

      <div class="social-buttons">
        <a href="#" class="social-btn twitter" id="twitter-btn" target="_blank">
          <svg viewBox="0 0 24 24"><path d="M23 3a10.9 10.9 0 01-3.14 1.53 4.48 4.48 0 00-7.86 3v1A10.66 10.66 0 013 4s-4 9 5 13a11.64 11.64 0 01-7 2c9 5 20 0 20-11.5a4.5 4.5 0 00-.08-.83A7.72 7.72 0 0023 3z"/></svg>
          Share on X
        </a>
        <a href="#" class="social-btn reddit" id="reddit-btn" target="_blank">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-1.5v-1h1.5v1zm-10 0H5.5v-1h1.5v1zm5 5.5c-2.5 0-4.5-1.5-4.5-3.5h9c0 2-2 3.5-4.5 3.5z"/></svg>
          Share on Reddit
        </a>
      </div>
    </div>

    <a href="index.html" class="back-link">
      <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Back to homepage
    </a>
  </div>

  <script>
    const SUPABASE_URL = 'https://iikrvgjfkuijcpvdwzvv.supabase.co';
    
    let userData = {
      position: 0,
      total: 0,
      referralCount: 0,
      referralCode: ''
    };

    async function fetchUserStatus() {
      const urlParams = new URLSearchParams(window.location.search);
      const referralCode = urlParams.get('ref');
      
      if (!referralCode) {
        showError('No referral code found. Please sign up first.');
        return;
      }

      try {
        const response = await fetch(`${SUPABASE_URL}/functions/v1/status?ref=${referralCode}`);
        
        if (!response.ok) {
          throw new Error('Failed to fetch status');
        }

        const data = await response.json();
        userData = {
          position: data.position,
          total: data.total_users,
          referralCount: data.referral_count,
          referralCode: data.referral_code
        };

        updateUI();
      } catch (error) {
        console.error('Error fetching status:', error);
        showError('Could not load your status. Please refresh the page.');
      }
    }

    function updateUI() {
      const shareUrl = `https://neuralmix.com/?ref=${userData.referralCode}`;
      
      document.getElementById('position').textContent = `#${userData.position.toLocaleString()}`;
      document.getElementById('subtitle').textContent = 
        `of ${userData.total.toLocaleString()} producers in line for early access`;
      document.getElementById('referral-count').textContent = 
        `${userData.referralCount} referral${userData.referralCount !== 1 ? 's' : ''}`;
      document.getElementById('referral-link').textContent = shareUrl;
      
      const progress = Math.min((userData.referralCount * 50) / userData.total * 100, 100);
      document.getElementById('progress-fill').style.width = `${progress}%`;
      
      const twitterText = encodeURIComponent(
        `I'm #${userData.position} in line for NeuralMix — an AI co-pilot for music mixing. Help me skip the line! 🎵`
      );
      document.getElementById('twitter-btn').href = 
        `https://twitter.com/intent/tweet?text=${twitterText}&url=${encodeURIComponent(shareUrl)}`;
      
      const redditTitle = encodeURIComponent(
        `I'm #${userData.position} in line for NeuralMix — AI music mixing co-pilot`
      );
      document.getElementById('reddit-btn').href = 
        `https://reddit.com/submit?title=${redditTitle}&url=${encodeURIComponent(shareUrl)}`;
    }

    function copyLink() {
      const linkText = document.getElementById('referral-link').textContent;
      
      navigator.clipboard.writeText(linkText).then(() => {
        const btn = document.getElementById('copy-btn');
        const btnText = document.getElementById('copy-text');
        
        btn.classList.add('copied');
        btnText.textContent = 'Copied!';
        
        setTimeout(() => {
          btn.classList.remove('copied');
          btnText.textContent = 'Copy';
        }, 2000);
      }).catch(err => {
        console.error('Failed to copy:', err);
        const linkElement = document.getElementById('referral-link');
        const selection = window.getSelection();
        const range = document.createRange();
        range.selectNodeContents(linkElement);
        selection.removeAllRanges();
        selection.addRange(range);
      });
    }

    function showError(message) {
      document.getElementById('subtitle').textContent = message;
      document.getElementById('subtitle').style.color = '#ef4444';
    }

    fetchUserStatus();
    setInterval(fetchUserStatus, 30000);
  </script>
</body>
</html>
